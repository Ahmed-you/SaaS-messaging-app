name: Deploy to Laravel Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Laravel Cloud
        env:
          DEPLOY_HOOK: ${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "Error: LARAVEL_CLOUD_DEPLOY_HOOK secret is empty or missing"
            exit 1
          fi

          curl -fsS -X POST "${DEPLOY_HOOK}?commit_hash=${GITHUB_SHA}"
